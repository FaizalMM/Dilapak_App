publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
